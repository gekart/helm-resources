apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app.kubernetes.io/name: web
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    spec:
      initContainers:
        - name: wait-for-it
          image: busybox:1.36
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: web
          image: {{ .Values.image }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: sidecar
          image: busybox:1.36
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
