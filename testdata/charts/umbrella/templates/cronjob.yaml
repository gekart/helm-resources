apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
  labels:
    app.kubernetes.io/name: backup
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup
            helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16
              # Intentionally no resources block — exercises the "missing" warning path.
