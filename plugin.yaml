name: resources
version: 0.1.0
type: cli/v1
apiVersion: v1
runtime: subprocess
config:
  usage: "resources CHART [flags]"
  shortHelp: "sum declared CPU/memory requests and limits across a rendered chart"
  longHelp: |
    helm-resources renders a chart (including umbrella charts with subcharts)
    and reports total declared resource consumption — CPU/memory requests and
    limits — across all workloads, before anything is deployed.

    Answers: "If I helm install this chart, how much capacity do I need?"
  ignoreFlags: false
runtimeConfig:
  platformCommand:
    - os: linux
      command: "${HELM_PLUGIN_DIR}/bin/helm-resources"
    - os: darwin
      command: "${HELM_PLUGIN_DIR}/bin/helm-resources"
    - os: windows
      command: "${HELM_PLUGIN_DIR}/bin/helm-resources.exe"
