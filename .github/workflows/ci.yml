name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go test ./... -race -coverprofile=coverage.out
      - name: Enforce coverage floor (aggregate, parse)
        run: |
          # Per-package totals are derived by filtering the merged profile
          # to lines under each package path and re-running `cover -func`.
          fail=0
          for pkg in internal/aggregate internal/parse; do
            filtered=$(mktemp)
            { head -1 coverage.out; grep -F "github.com/gekart/helm-resources/${pkg}/" coverage.out || true; } > "$filtered"
            pct=$(go tool cover -func="$filtered" | awk '/^total:/ {gsub("%","",$3); print $3}')
            rm -f "$filtered"
            echo "$pkg coverage: ${pct}%"
            if ! awk -v v="$pct" 'BEGIN { exit (v+0 >= 80) ? 0 : 1 }'; then
              echo "::error::$pkg coverage ${pct}% < 80%"
              fail=1
            fi
          done
          exit $fail

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # action v8 pairs with golangci-lint v2.x; pinning a version that's
      # built with Go 1.25+ avoids the `go1.24 < target 1.25` mismatch.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
