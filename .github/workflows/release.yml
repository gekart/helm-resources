name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      - name: Build cross-platform binaries and stage plugin
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="staging/helm-resources"
          mkdir -p "$STAGE/bin"
          # plugin.yaml goes into the tarball with its version field synced to the tag.
          sed "s/^version:.*/version: ${VERSION}/" plugin.yaml > "$STAGE/plugin.yaml"
          cp LICENSE "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/" 2>/dev/null || true
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="$STAGE/bin/helm-resources-${os}-${arch}${ext}"
            echo "Building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X github.com/gekart/helm-resources/cmd.version=${VERSION}" \
                -o "$out" \
                ./cmd
          done
          ls -la "$STAGE/bin"

      - name: Package plugin
        run: |
          set -euo pipefail
          mkdir -p dist
          helm plugin package staging/helm-resources --sign=false --destination dist/
          ls -la dist/

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.tgz \
            staging/helm-resources/bin/*
